services:
  postgres:
    image: postgres:18
    container_name: moza_postgres
    environment:
      POSTGRES_DB: nmc
      POSTGRES_USER: nmc
      POSTGRES_PASSWORD: nmc
    ports:
      - "5432:5432"
    volumes:
      - moza_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nmc -d nmc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  moza_postgres_data:
