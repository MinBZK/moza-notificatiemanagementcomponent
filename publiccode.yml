description:
  nl:
    localisedName: MOZa NotificatieManagementComponent
    shortDescription: >-
      Centrale component voor het versturen van overheidsnotificaties en het
      orkestreren van contactherstel binnen MijnOverheid Zakelijk (MOZa).
    longDescription: >
      De NotificatieManagementComponent (NMC) is de centrale hub voor het
      versturen van notificaties namens een Dienstverlener. De NMC stelt het
      bericht samen via de Templating Service, verstuurt het via NotifyNL,
      verwerkt de bezorgstatus en orkestreert - bij een mislukte digitale
      bezorging - contactherstel via een fysieke brief (Printstraat/Postadres).


      Deze repository bevat de broncode van de NMC. Het MOZa-project bestaat
      uit meerdere repositories binnen de MinBZK organisatie, te herkennen aan
      de moza- prefix of het topic mijnoverheidzakelijk.
    features:
      - Versturen van notificaties via NotifyNL (e-mail en fysieke post)
      - Verwerken van asynchrone bezorgstatussen
      - Orkestreren van contactherstel bij een mislukte bezorging
  en:
    shortDescription: >-
      Central component for sending government notifications and
      orchestrating contact recovery within "MijnOverheid Zakelijk" (MOZa).
    longDescription: >
      The NotificatieManagementComponent (NMC) is the central hub for sending
      notifications on behalf of a Dienstverlener. The NMC composes the
      message via the Templating Service, sends it through NotifyNL,
      processes the delivery status and - if digital delivery fails -
      orchestrates contact recovery ("contactherstel") via a physical letter
      (Printstraat/Postadres).


      This repository contains the source code of the NMC. The MOZa project
      consists of multiple repositories within the MinBZK organisation,
      identifiable by the moza- prefix or the mijnoverheidzakelijk topic.
    features:
      - Sending notifications via NotifyNL (email and physical mail)
      - Processing asynchronous delivery statuses
      - Orchestrating contact recovery on failed delivery
