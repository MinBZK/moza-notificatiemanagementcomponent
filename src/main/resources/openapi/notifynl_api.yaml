    SendNormalLetterRequest:
      type: object
      description: The Letter Request Payload
      properties:
        template_id:
          type: string
          description: |-
            To find the template ID:

            1.  [Sign in to NotifyNL](https://admin.notifynl.nl/sign-in).
            2.  Go to the **Templates** page and select the relevant template.
            3.  Select **Copy template ID to clipboard**.
          example: f33517ff-2a88-4f6e-b855-c550268ce08a
        personalisation:
          type: object
          description: |-
            The personalisation argument always contains the following parameters for the letter recipient’s address:

            **The address must have at least 3 lines.**

            The last line needs to be a real NL postcode or the name of a country outside the NL.

            Notify checks for international addresses and will automatically charge you the correct postage.

            The `postcode` personalisation argument has been replaced. If your template still uses `postcode`, Notify will treat it as the last line of the address.

            Any other placeholder fields included in the letter template also count as required parameters. You need to provide their values in a dictionary with key value pairs. For example:
          properties:
            address_line_1:
              type: string
              example: The Occupier
            address_line_2:
              type: string
              example: 123 High Street
            address_line_3:
              type: string
              example: Richmond upon Thames
            address_line_4:
              type: string
              example: Middlesex
            address_line_5:
              type: string
              example: SW14 6BF
            address_line_6:
              type: string
            address_line_7:
              type: string
            name:
              type: string
              example: John Smith
            application_id:
              type: string
              example: '4134325'
            required_documents:
              type: array
              items:
                type: string
              example:
                - passport
                - utility bill
                - other id
          required:
            - address_line_1
            - address_line_2
            - address_line_3
        reference:
          type: string
          description: You can leave out this argument if you do not have a reference. An identifier you can create if necessary. This reference identifies a single notification or a batch of notifications. It must not contain any personal information such as name or postal address.
          example: STRING
      required:
        - template_id
        - personalisation
    SendPrecompiledLetterRequest:
      type: object
      description: The Precompiled Send Letter Request Payload
      properties:
        reference:
          type: string
          description: An identifier you can create if necessary. This reference identifies a single notification or a batch of notifications. It must not contain any personal information such as name or postal address.
          example: STRING
        content:
          type: string
          format: byte
          description: The precompiled letter must be a PDF file which meets [the NotifyNL letter specification](https://admin.notifynl.nl/using-notify/guidance/letter-specification). You’ll need to convert the file into a string that is base64 encoded.
          example: base64EncodedPDFFile
        postage:
          type: string
          description: You can choose first class, second class or economy mail postage for your precompiled letter. Set the value to <code>first</code> for first class, <code>second</code> for second class or <code>economy</code> for economy mail. If you do not pass in this argument, the postage will default to second class. During processing of the letter notify will detect international addresses automatically and may change the postage value to <code>europe</code> or <code>rest-of-world</code> automatically.
          example: base64EncodedPDFFile
      required:
        - reference
        - content
