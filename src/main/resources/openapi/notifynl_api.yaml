components:
  schemas:
    SendTextMessageRequest:
      type: object
      description: The Send Text Message Request Payload
      properties:
        phone_number:
          type: string
          description: The phone number of the recipient of the text message. This can be a NL or international number.
          example: '+447900900123'
          maxLength: 15
          minLength: 7
        template_id:
          type: string
          description: |-
            To find the template ID:

            1.  [Sign in to NotifyNL](https://admin.notifynl.nl/sign-in).
            2.  Go to the **Templates** page and select the relevant template.
            3.  Select **Copy template ID to clipboard**.
          example: f33517ff-2a88-4f6e-b855-c550268ce08a
        personalisation:
          type: object
          description: 'You can leave out this argument if a template does not have any placeholder fields for personalised information.<br/>If a template has placeholder fields for personalised information such as name or reference number, you must provide their values in a dictionary with key value pairs. For example:'
          properties:
            first_name:
              type: string
              example: Amala
            application_date:
              type: string
              example: '2018-01-01'
        reference:
          type: string
          description: You can leave out this argument if you do not have a reference. An identifier you can create if necessary. This reference identifies a single notification or a batch of notifications. It must not contain any personal information such as name or postal address.
          example: STRING
        sms_sender_id:
          type: string
          description: |-

            A unique identifier of the sender of the text message notification.
            To find the text message sender:

            1.  [Sign in to NotifyNL](https://admin.notifynl.nl/sign-in).
            2.  Go to the **Settings** page.
            3.  In the **Text Messages** section, select **Manage** on the **Text Message sender** row.

            You can then either:

            *   copy the sender ID that you want to use and paste it into the method
            *   select **Change** to change the default sender that the service will use, and select **Save**

            You can leave out this argument if your service only has one text message sender, or if you want to use the default sender.
          example: 8e222534-7f05-4972-86e3-17c5d9f894e2
      required:
        - phone_number
        - template_id
    SendTextMessageResponse:
      type: object
      description: The Send Text Message Response Payload
      properties:
        id:
          type: string
          example: 740e5834-3a29-46b4-9a6f-16142fde533a
        reference:
          type: string
          example: STRING
        scheduled_for:
          type: string
          nullable: true
          example: null
        content:
          type: object
          properties:
            body:
              type: string
              example: MESSAGE TEXT
            from_number:
              type: string
              example: SENDER
        uri:
          type: string
          example: https://api.notifynl.nl/v2/notifications/740e5834-3a29-46b4-9a6f-16142fde533a
        template:
          type: object
          properties:
            id:
              type: string
              example: f33517ff-2a88-4f6e-b855-c550268ce08a
            version:
              type: number
              example: 1
            uri:
              type: string
              example: https://api.notifynl.nl/v2/template/ceb50d92-100d-4b8b-b559-14fa3b091cd
    SendNotificaitonRequestError:
      type: object
      description: Bad request error response
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              error:
                type: string
                example: ValidationError
                description: Error type
              message:
                type: string
                example: X is a required property
                description: Error message
        status_code:
          type: integer
          example: 400
    AuthError:
      type: object
      description: Auth error response
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              error:
                type: string
                example: AuthError
                description: Error type
              message:
                type: string
                example: 'Error: Your system clock must be accurate to within 30 seconds'
                description: Error string
        status_code:
          type: integer
          example: 403
    LimitError:
      type: object
      description: Rate or service limit error response
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              error:
                type: string
                example: TooManyRequestsError
                description: Error type
              message:
                type: string
                example: Exceeded rate limit for key type TEAM/TEST/LIVE of 3000 requests per 60 seconds
                description: Error string
        status_code:
          type: integer
          example: 429
    ServerError:
      type: array
      description: Rate or service limit error response
      items:
        type: object
        properties:
          error:
            type: string
            example: Exception
          message:
            type: string
            example: Internal server error
            description: Notify was unable to process the request, resend your notification.
    SmsCallbackRequest:
      type: object
      properties:
        id:
          type: string
          example: 75a36070-55dc-4dc1-ac33-89da9377d989
        reference:
          type: string
          example: null
        to:
          type: string
          example: '07777777777'
        status:
          type: string
          example: delivered
        created_at:
          type: string
          example: '2023-09-16T16:50:09.090424Z'
        completed_at:
          type: string
          example: '2023-09-16T16:50:10.042907Z'
        sent_at:
          type: string
          example: '2023-09-16T16:50:09.219763Z'
        notification_type:
          type: string
          example: sms
        template_id:
          type: string
          example: 8496188f-3f35-401b-9b8c-f97a528c5b76
        template_version:
          type: number
          example: 1
      required: []
    SendEmailRequest:
      type: object
      description: The Send Email Request Payload
      properties:
        email_address:
          type: string
          description: The email address of the recipient.
          example: sender@something.com
          maxLength: 250
          minLength: 5
        template_id:
          type: string
          description: |-
            To find the template ID:

            1.  [Sign in to NotifyNL](https://admin.notifynl.nl/sign-in).
            2.  Go to the **Templates** page and select the relevant template.
            3.  Select **Copy template ID to clipboard**.
          example: f33517ff-2a88-4f6e-b855-c550268ce08a
        one_click_unsubscribe_url:
          type: string
          description: |-
            You can leave out this argument if the email being sent is not a subscription email.

            If you send subscription emails you must let recipients opt out of receiving them. Read our Using Notify page for more information about [unsubscribe links](https://admin.notifynl.nl/using-notify/unsubscribe-links).

            The one-click unsubscribe URL will be added to the headers of your email. Email clients will use it to add an unsubscribe button.

            The one-click unsubscribe URL must respond to an empty `POST` request by unsubscribing the user from your emails. You can include query parameters to help you identify the user.

            Your unsubscribe URL and response must comply with the guidance specified in [Section 3.1 of IETF RFC 8058](https://www.rfcreader.com/#rfc8058_line139).

            **Unsubscribe link at the bottom of the email (recommended)**

            To add an unsubscribe link at the bottom of your email, use square brackets around the link text and round brackets around the URL. Make sure there are no spaces between the brackets or the link will not work.

            Use this example if you have a webpage for users to manage their email subscriptions:

            ```json
            [Unsubscribe](https://www.example.gov.uk/unsubscribe)
            ```
            Your webpage should ask the recipients to confirm that they want to unsubscribe. 

            If you do not have your own webpage, you can add a ‘mailto’ link to let users send an email to your team instead. For example:

            ```json
            [Unsubscribe](mailto:example@gov.uk?subject=unsubscribe)
            ```
            The email address should be a shared inbox managed by your team, not your own email address.
          example: https://example.com/unsubscribe.html?opaque=123456789
        personalisation:
          type: object
          description: |-
            You can leave out this argument if a template does not have any placeholder fields for personalised information.

            If a template has placeholder fields for personalised information such as name or reference number, you must provide their values in a dictionary with key value pairs. For example:
          additionalProperties: true
          properties:
            first_name:
              type: string
              example: Amala
            application_date:
              type: string
              example: '2018-01-01'
            required_documents:
              type: array
              description: Pass in a list and it will appear as bullet points in the message.
              items:
                type: string
              example:
                - passport
                - utility bill
                - other id
            link_to_file:
              type: object
              description: |-
                You can leave out this argument if you do not have any file to attach.

                To send a file by email, add a placeholder to the template then upload a file. The placeholder will contain a secure link to download the file.

                The links are unique and unguessable. NotifyNL cannot access or decrypt your file.

                Your file will be available to download for a default period of 26 weeks (6 months).

                To help protect your files you can also:

                * ask recipients to confirm their email address before downloading
                * choose the length of time that a file is available to download**Add contact details to the file download page**

                1. [Sign in to NotifyNL](https://admin.notifynl.nl/sign-in).
                1. Go to the __Settings__ page.
                1. In the __Email__ section, select __Manage__ on the __Send files by email__ row.
                1. Enter the contact details you want to use, and select __Save__. 

                **Add a placeholder to the template**

                1. [Sign in to NotifyNL](https://admin.notifynl.nl/sign-in).
                1. Go to the __Templates__ page and select the relevant email template.
                1. Select __Edit__.
                1. Add a placeholder to the email template using double brackets. For example: 'Download your file at: ((link_to_file))'

                Your email should also tell recipients how long the file will be available to download.

                **Upload your file**

                You can upload the following file types:

                - PDF (.pdf)
                - CSV (.csv)
                - Text (.odt, .txt, .rtf, .json)
                - MS Word Document (.doc, .docx)
                - Ms Excel Spreadsheet (.xlsx)

                Your file must be smaller than 2MB. [Contact the NotifyNL team](https://admin.notifynl.nl/support/ask-question-give-feedback) if you need to send other file types.

                You’ll need to convert the file into a string that is base64 encoded.

                Pass the encoded string into an object with a `file` key, and put that in the personalisation argument.

                **Set the filename**

                You should provide a filename when you upload your file.

                The filename should tell the recipient what the file contains. A memorable filename can help the recipient to find the file again later.

                The filename must end with a file extension. For example, `.csv` for a CSV file. If you include the wrong file extension, recipients may not be able to open your file.

                The filename should be no more that 100 characters long

                If you do not provide a filename for your file, Notify will:

                * generate a random filename
                * try to add the correct file extension

                If Notify cannot add the correct file extension, recipients may not be able to open your file.

                **Ask recipients to confirm their email address before they can download the file**

                When a recipient clicks the link in the email you’ve sent them, they have to enter their email address. Only someone who knows the recipient’s email address can download the file.

                This security feature is turned on by default.

                **Turn off email address check (not recommended)**

                If you do not want to use this feature, you can turn it off on a file-by-file basis.

                You should not turn this feature off if you send files that contain:

                * personally identifiable information
                * commercially sensitive information
                * information classified as ‘OFFICIAL’ or ‘OFFICIAL-SENSITIVE’ under the [Government Security Classifications](https://www.gov.uk/government/publications/government-security-classifications) policy

                To let the recipient download the file without confirming their email address, set the `confirm_email_before_download` flag to `false`.

                **Choose the length of time that a file is available to download**

                Set the number of weeks you want the file to be available using the `retention_period` key.

                You can choose any value between <code>1 week</code> and <code>26 weeks</code>. When deciding this, you should consider:

                * the need to protect the recipient’s personal information
                * whether the recipient will need to download the file again later

                If you do not choose a value, the file will be available for the default period of 26 weeks (6 months).

                Files sent before 12 April 2023 had a longer default period of 78 weeks (18 months).
              properties:
                file:
                  type: string
                  format: byte
                  description: File as base64 encoded string
                  example: file as base64 encoded string
                filename:
                  type: string
                  description: File name
                  maxLength: 100
                  example: report.csv
                confirm_email_before_download:
                  type: boolean
                  description: To let the recipient download the file without confirming their email address, set the `confirm_email_before_download` flag to `false`.
                  example: false
                retention_period:
                  type: string
                  description: The length of time that a file is available to download in weeks.  Choose between <code>1 week</code> and <code>26 weeks</code>
                  example: 4 weeks
              required:
                - file
        reference:
          type: string
          description: |-
            You can leave out this argument if you do not have a reference.

            An identifier you can create if necessary. This reference identifies a single notification or a batch of notifications. It must not contain any personal information such as name or postal address.
          example: STRING
        email_reply_to_id:
          type: string
          description: |-
            You can leave out this argument if your service only has one reply-to email address, or you want to use the default email address.

            This is an email address specified by you to receive replies from your users. You must add at least one reply-to email address before your service can go live.

            To add a reply-to email address:

            1.  [Sign in to NotifyNL](https://admin.notifynl.nl/sign-in).
            2.  Go to the **Settings** page.
            3.  In the **Email** section, select **Manage** on the **Reply-to email addresses** row.
            4.  Select **Add reply-to address**.
            5.  Enter the email address you want to use, and select **Add**.
          example: STRING
      required:
        - email_address
        - template_id
    SendEmailResponse:
      type: object
      description: The Send Email Response Payload
      properties:
        id:
          type: string
          example: 740e5834-3a29-46b4-9a6f-16142fde533a
        reference:
          type: string
          example: STRING
        scheduled_for:
          type: string
          nullable: true
          example: null
        content:
          type: object
          properties:
            subject:
              type: string
              example: SUBJECT TEXT
            body:
              type: string
              example: MESSAGE TEXT
            from_email:
              type: string
              example: SENDER EMAIL
            one_click_unsubscribe_url:
              type: string
              example: https://example.com/unsubscribe.html?opaque=123456789
              nullable: true
        uri:
          type: string
          example: https://api.notifynl.nl/v2/notifications/740e5834-3a29-46b4-9a6f-16142fde533a
        template:
          type: object
          properties:
            id:
              type: string
              example: f33517ff-2a88-4f6e-b855-c550268ce08a
            version:
              type: number
              example: 1
            uri:
              type: string
              example: https://api.notifynl.nl/v2/template/f33517ff-2a88-4f6e-b855-c550268ce08a
    EmailCallbackRequest:
      type: object
      properties:
        id:
          type: string
          example: 75a36070-55dc-4dc1-ac33-89da9377d989
