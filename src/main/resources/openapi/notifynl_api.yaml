openapi: 3.0.1
info:
  description: The NotifyNL REST API. Read [our documentation](https://docs.notifynl.nl) for more details.
  title: NotifyNL API
  version: 1.0.3
  license:
    name: European Union Public Licence v1.2
    url: https://eupl.eu/
  x-logo:
    url: https://omc-notify.gitbook.io/omc-notify-docs/~gitbook/image?url=https%3A%2F%2F1558516846-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-x-prod.appspot.com%2Fo%2Forganizations%252FnXcWmFpocmdy1LTho1Vw%252Fsites%252Fsite_DzlDE%252Ficon%252FBXd2A6ANNvmovbp4YeNR%252Ffavicon.png%3Falt%3Dmedia%26token%3D2ad71981-de69-4eac-85a7-7c2b476d1ee1&width=32&dpr=1&quality=100&sign=aaa4205a&sv=2
    altText: NotifyNL
servers:
  - url: https://api.notifynl.nl
tags:
  - name: Send a message
    description: Send a message.
  - name: Get message data
    description: Get message status
  - name: Get a template
    description: Get a template
  - name: Get received text messages
    description: Get received text messages
paths:
  /v2/notifications/sms:
    post:
      description: You can use this endpoint to send text message.  You can configure callbacks that provide delivery receipts by following the instructions in [our documentation](https://docs.notifynl.nl/rest-api.html#callbacks).
      operationId: sendTextMessage
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendTextMessageRequest'
        description: requestPayload
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendTextMessageResponse'
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificaitonRequestError'
          description: Bad request. Check the `message` in the response to find out why your request failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'
          description: Auth error. Check the `message` in the response to find out why your request failed.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LimitError'
          description: Rate or service limit error. Check the `message` in the response to find out why your request failed.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
          description: Internal server error. Check the `message` in the response to find out why your request failed.
      callbacks:
        onSmsSend:
          '{$callback_url}':
            post:
              requestBody:
                description: |-
                  Callbacks are when NotifyNL sends POST requests to your service. You can get callbacks when sms you’ve sent is delivered or fails.

                  ### Set up callbacks

                  You must provide:

                  - a URL where Notify will post the callback to
                  - a bearer token which Notify will put in the authorisation header of the requests

                  To do this:

                  1. [Sign in to NotifyNL](https://admin.notifynl.nl/sign-in).
                  1. Go to the __API integration__ page.
                  1. Select __Callbacks__.

                  ### Retry callbacks

                  If Notify sends a `POST` request to your service, but the request fails then we will retry.

                  We will retry every 5 minutes, up to a maximum of 5 times.

                  ### Delivery receipts

                  When you send an text message, Notify will send a receipt to your callback URL with the status of the message. This is an automated method to get the status of messages.

                  This functionality works with test API keys, but does not work with smoke testing phone numbers.

                  The callback message is formatted in JSON. All of the values are strings, apart from the template version, which is a number. The key, description and format of the callback message arguments will be:
                  |Key | Description | Format|
                  |:---|:---|:---|
                  |`id` | Notify’s id for the status receipts | UUID|
                  |`reference` | The reference sent by the service | `12345678` or null|
                  |`to` | The phone number of the recipient | `07700912345`|
                  |`status` | The status of the notification | `delivered`, `permanent-failure`, `temporary-failure` or `technical-failure`|
                  |`created_at` | The time the service sent the request | `2017-05-14T12:15:30.000000Z`|
                  |`completed_at` | The last time the status was updated | `2017-05-14T12:15:30.000000Z` or null|
                  |`sent_at` | The time the notification was sent | `2017-05-14T12:15:30.000000Z` or null|
                  |`notification_type` | The notification type | `sms`|
                  |`template_id` | The id of the template that was used | UUID|
                  |`template_version` | The version number of the template that was used | `1`|
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/SmsCallbackRequest'
              responses:
                2XX:
                  description: Success
                4XX:
                  description: Failed
                5XX:
                  description: Failed
              security:
                - BearerAuth: []
              summary: Text message callback
      security:
        - BearerAuth: []
      summary: Send a text message
      tags:
        - Send a message
  /v2/notifications/email:
    post:
      description: You can use this endpoint to send email.  You can configure callbacks that provide delivery receipts by following the instructions in [our documentation](https://docs.notifynl.nl/rest-api.html#callbacks).
      operationId: sendEmail
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailRequest'
        description: requestPayload
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailResponse'
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificaitonRequestError'
          description: Bad request. Check the `message` in the response to find out why your request failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'
          description: Auth error. Check the `message` in the response to find out why your request failed.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LimitError'
          description: Rate or service limit error. Check the `message` in the response to find out why your request failed.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
          description: Internal server error. Check the `message` in the response to find out why your request failed.
      callbacks:
        onEmailSend:
          '{$callback_url}':
            post:
              requestBody:
                description: |-
                  Callbacks are when NotifyNL sends POST requests to your service. You can get callbacks when email you’ve sent is delivered or fails.

                  ### Set up callbacks

                  You must provide:

                  - a URL where Notify will post the callback to
                  - a bearer token which Notify will put in the authorisation header of the requests

                  To do this:

                  1. [Sign in to NotifyNL](https://admin.notifynl.nl/sign-in).
                  1. Go to the __API integration__ page.
                  1. Select __Callbacks__.

                  ### Retry callbacks

                  If Notify sends a `POST` request to your service, but the request fails then we will retry.

                  We will retry every 5 minutes, up to a maximum of 5 times.

                  ### Delivery receipts

                  When you send an email, Notify will send a receipt to your callback URL with the status of the message. This is an automated method to get the status of messages.

                  This functionality works with test API keys, but does not work with smoke testing email addresses.

                  The callback message is formatted in JSON. All of the values are strings, apart from the template version, which is a number. The key, description and format of the callback message arguments will be:
                  |Key | Description | Format|
                  |:---|:---|:---|
                  |`id` | Notify’s id for the status receipts | UUID|
                  |`reference` | The reference sent by the service | `12345678` or null|
                  |`to` | The email address of the recipient | `hello@gov.uk`|
                  |`status` | The status of the notification | `delivered`, `permanent-failure`, `temporary-failure` or `technical-failure`|
                  |`created_at` | The time the service sent the request | `2017-05-14T12:15:30.000000Z`|
                  |`completed_at` | The last time the status was updated | `2017-05-14T12:15:30.000000Z` or null|
                  |`sent_at` | The time the notification was sent | `2017-05-14T12:15:30.000000Z` or null|
                  |`notification_type` | The notification type | `email`|
                  |`template_id` | The id of the template that was used | UUID|
                  |`template_version` | The version number of the template that was used | `1`|
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/EmailCallbackRequest'
              responses:
                2XX:
                  description: Success
                4XX:
                  description: Failed
                5XX:
                  description: Failed
              security:
                - BearerAuth: []
              summary: Email callback
      security:
        - BearerAuth: []
      summary: Send an email
      tags:
        - Send a message
  /v2/notifications/letter:
    post:
      description: You can use this endpoint to send letter.
      operationId: sendLetter
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendLetterRequest'
            examples:
              Letter:
                value:
                  template_id: f33517ff-2a88-4f6e-b855-c550268ce08a
                  personalisation:
                    address_line_1: The Occupier
                    address_line_2: 123 High Street
                    address_line_3: Richmond upon Thames
                    address_line_4: Middlesex
                    address_line_5: SW14 6BF
                    address_line_6: string
                    address_line_7: string
                    name: John Smith
                    application_id: '4134325'
                    required_documents:
                      - passport
                      - utility bill
                      - other id
                  reference: STRING
              Precompiled Letter:
                value:
                  reference: STRING
                  content: base64EncodedPDFFile
                  postage: second
        description: requestPayload
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendLetterResponse'
              examples:
                Letter:
                  value:
                    id: 740e5834-3a29-46b4-9a6f-16142fde533a
                    reference: STRING
                    content:
                      subject: SUBJECT TEXT
                      body: LETTER TEXT
                    uri: https://api.notifynl.nl/v2/notifications/740e5834-3a29-46b4-9a6f-16142fde533a
                    template:
                      id: f33517ff-2a88-4f6e-b855-c550268ce08a
                      version: 1
                      uri: https://api.notifynl.nl/v2/template/f33517ff-2a88-4f6e-b855-c550268ce08a
                    scheduled_for: null
                Precompiled Letter:
                  value:
                    id: 740e5834-3a29-46b4-9a6f-16142fde533a
                    reference: your-letter-reference
                    postage: postage-you-have-set-or-default
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificaitonRequestError'
          description: Bad request. Check the `message` in the response to find out why your request failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'
          description: Auth error. Check the `message` in the response to find out why your request failed.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LimitError'
          description: Rate or service limit error. Check the `message` in the response to find out why your request failed.
      security:
        - BearerAuth: []
      summary: Send a letter
      tags:
        - Send a message
  /v2/notifications/{notification_id}:
    get:
      description: You can use this endpoint to get the data for one message. The data includes the status of the message. The status will vary depending on the type of message you have sent.<br />You can only get the data for messages sent within the retention period. The default retention period is 7 days.<br />You can omit any of these optional arguments to ignore these filters.
      operationId: getMessageData
      parameters:
        - description: The ID of the notification. You can find the notification ID in the response to the original notification method call.
          example: 740e5834-3a29-46b4-9a6f-16142fde533a
          in: path
          name: notification_id
          schema:
            type: string
          required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOneMessageResponse'
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMessageValidationError'
          description: Bad request. Check the `message` in the response to find out why your request failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'
          description: Auth error. Check the `message` in the response to find out why your request failed.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMessageNoResultFoundError'
          description: Result not found. Check the `message` in the response to find out why your request failed.
      security:
        - BearerAuth: []
      summary: Get the data for one message
      tags:
        - Get message data
  /v2/notifications:
    get:
      description: This API call returns one page with data for up to 250 messages. You can get either the most recent messages, or get older messages by specifying a particular notification ID in the `older_than` argument.<br />You can only get the data for messages that are 7 days old or newer.<br />This will return all your messages with statuses. They will display in pages of up to 250 messages each.<br />You can omit any of these arguments to ignore these filters.
      operationId: getMultipleMessagesStatus
      parameters:
        - description: You can filter by `email`, `sms` or `letter`
          in: query
          name: template_type
          schema:
            type: string
            enum:
              - email
              - sms
              - letter
        - description: You can filter by message status.
          in: query
          name: status
          schema:
            type: string
            enum:
              - accepted
              - created
              - sending
              - pending
              - sent
              - received
              - delivered
              - cancelled
              - pending-virus-check
              - virus-scan-failed
              - validation-failed
              - permanent-failure
              - temporary-failure
              - technical-failure
          examples:
            Emails:
              summary: Emails Status
              description: |
                | Status | Description |
                | --- | --- |
                | `created` | NotifyNL has placed the message in a queue, ready to be sent to the provider. It should only remain in this state for a few seconds. |
                | `sending` | NotifyNL has sent the message to the provider. The provider will try to deliver the message to the recipient for up to 72 hours. NotifyNL is waiting for delivery information. |
                | `delivered` | The message was successfully delivered. |
                | `permanent-failure` | The provider could not deliver the message because the email address was wrong. You should remove these email addresses from your database. |
                | `temporary-failure` | The provider could not deliver the message. This can happen when the recipient’s inbox is full or their anti-spam filter rejects your email. [Check your content does not look like spam](https://www.gov.uk/service-manual/design/sending-emails-and-text-messages#protect-your-users-from-spam-and-phishing) before you try to send the message again. |
                | `technical-failure` | Your message was not sent because there was a problem between Notify and the provider.  <br>You’ll have to try sending your messages again. |
            Text Message:
              summary: Text Message Status
              description: |-
                | Status | Description |
                | --- | --- |
                | `created` | NotifyNL has placed the message in a queue, ready to be sent to the provider. It should only remain in this state for a few seconds. |
                | `sending` | NotifyNL has sent the message to the provider. The provider will try to deliver the message to the recipient for up to 72 hours. NotifyNL is waiting for delivery information. |
                | `pending` | NotifyNL is waiting for more delivery information.  <br>NotifyNL received a callback from the provider but the recipient’s device has not yet responded. Another callback from the provider determines the final status of the text message. |
                | `sent` | The message was sent to an international number. The mobile networks in some countries do not provide any more delivery information. The NotifyNL website displays this status as ‘Sent to an international number’. |
                | `delivered` | The message was successfully delivered. If a recipient blocks your sender ID or mobile number, your message will still show as delivered. |
                | `permanent-failure` | The provider could not deliver the message. This can happen if the phone number was wrong or if the network operator rejects the message. If you’re sure that these phone numbers are correct, you should [contact NotifyNL support](https://admin.notifynl.nl/support). If not, you should remove them from your database. You’ll still be charged for text messages that cannot be delivered. |
                | `temporary-failure` | The provider could not deliver the message. This can happen when the recipient’s phone is off, has no signal, or their text message inbox is full. You can try to send the message again. You’ll still be charged for text messages to phones that are not accepting messages. |
                | `technical-failure` | Your message was not sent because there was a problem between Notify and the provider.  <br>You’ll have to try sending your messages again. You will not be charged for text messages that are affected by a technical failure. |
            Letter:
              summary: Letter Status
              description: |-
                | Status | Description |
                | --- | --- |
                | `accepted` | NotifyNL has sent the letter to the provider to be printed. |
                | `received` | The provider has printed and dispatched the letter. |
                | `cancelled` | Sending cancelled. The letter will not be printed or dispatched. |
                | `technical-failure` | NotifyNL had an unexpected error while sending the letter to our printing provider. |
                | `permanent-failure` | The provider cannot print the letter. Your letter will not be dispatched. |
            Precompiled Letter:
              summary: Precompiled Letter Status
              description: |-
                | Status | Description |
                | --- | --- |
                | `accepted` | NotifyNL has sent the letter to the provider to be printed. |
                | `received` | The provider has printed and dispatched the letter. |
                | `cancelled` | Sending cancelled. The letter will not be printed or dispatched. |
                | `pending-virus-check` | NotifyNL has not completed a virus scan of the precompiled letter file. |
                | `virus-scan-failed` | NotifyNL found a potential virus in the precompiled letter file. |
                | `validation-failed` | Content in the precompiled letter file is outside the printable area. See the [NotifyNL letter specification](https://admin.notifynl.nl/using-notify/guidance/letter-specification) for more information. |
                | `technical-failure` | NotifyNL had an unexpected error while sending the letter to our printing provider. |
                | `permanent-failure` | The provider cannot print the letter. Your letter will not be dispatched. |
        - description: An identifier you can create if necessary. This reference identifies a single notification or a batch of notifications. It must not contain any personal information such as name or postal address.
          name: reference
          in: query
          schema:
            type: string
          example: STRING
        - description: Input the ID of a notification into this argument. If you use this argument, the method returns the next 250 received notifications older than the given ID.<br />If you leave out this argument, the method returns the most recent 250 notifications.<br />The client only returns notifications that are 7 days old or newer. If the notification specified in this argument is older than 7 days, the client returns an empty response.
          name: older_than
          in: query
          schema:
            type: string
          example: 740e5834-3a29-46b4-9a6f-16142fde533a
        - description: Includes notifications sent as part of a batch upload.<br />If you leave out this argument, the method only returns notifications sent using the API.
          name: include_jobs
          in: query
          schema:
            type: boolean
          example: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMultipleMessagesResponse'
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMessageValidationError'
          description: Bad request. Check the `message` in the response to find out why your request failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'
          description: Auth error. Check the `message` in the response to find out why your request failed.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMessageNoResultFoundError'
          description: Result not found. Check the `message` in the response to find out why your request failed.
      security:
        - BearerAuth: []
      summary: Get the data for multiple messages
      tags:
        - Get message data
  /v2/notifications/{notification_id}/pdf:
    get:
      description: You can use this endpoint to get PDF contents of a letter.
      operationId: getLetterPdfContents
      parameters:
        - description: |-
            The ID of the notification. You can find the notification ID in the response to the original notification method call.
            You can also find it by [signing in to NotifyNL](https://admin.notifynl.nl/sign-in) and going to the **API integration** page.
          example: 740e5834-3a29-46b4-9a6f-16142fde533a
          in: path
          name: notification_id
          schema:
            type: string
          required: true
      responses:
        '200':
          content:
            application/pdf:
              schema:
                type: string
                format: binary
          description: If the request to the client is successful, the client will return bytes representing the raw PDF data.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMessageValidationError'
          description: Bad request. Check the `message` in the response to find out why your request failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'
          description: Auth error. Check the `message` in the response to find out why your request failed.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMessageNoResultFoundError'
          description: Result not found. Check the `message` in the response to find out why your request failed.
      security:
        - BearerAuth: []
      summary: Get the the PDF contents of a letter
      tags:
        - Get message data
  /v2/received-text-messages:
    get:
      description: |-
        **Get received text messages**
        This API call returns one page of up to 250 received text messages. You can get either the most recent messages, or get older messages by specifying a particular notification ID in the older_than argument.
        You can only get the data for messages that are 7 days old or newer.
        **Enable received text messages**
        To receive text messages:
        1.  Go to the **Text message settings** section of the **Settings** page.
        2.  Select **Change** on the **Receive text messages** row.
      operationId: getReceivedMessagesStatus
      parameters:
        - description: The ID of a received text message. If this is passed, the response will only list text messages received before that message.
          in: query
          name: older_than
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetReceivedTextMessagesResponse'
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMessageValidationError'
          description: Bad request. Check the `message` in the response to find out why your request failed.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'
          description: Auth error. Check the `message` in the response to find out why your request failed.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMessageNoResultFoundError'
          description: Result not found. Check the `message` in the response to find out why your request failed.
      security:
        - BearerAuth: []
      summary: Get received text messages
      tags:
        - Get received text messages
  /v2/templates:
    get:
      description: This returns the latest version of all templates.
      operationId: GetTemplates
      parameters:
        - name: type
          in: query
          description: 'If you leave out this argument, the method returns all templates. Otherwise you can filter by: email, sms, letter'
          required: false
          schema:
            $ref: '#/components/schemas/TemplatesRequest'
          examples:
            sms:
              summary: type=sms
              description: Show templates of type SMS
              value: sms
            email:
              summary: type=email
              description: Show templates of type email
              value: email
            letter:
              summary: type=letter
              description: Show templates of type email
              value: letter
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplatesResponse'
              examples:
                sms:
                  value:
                    templates:
                      - id: b7a59abd-0ab2-4538-b619-8da9f9089e08
                        name: Test SMS Template
                        type: sms
                        created_at: '2024-08-12T11:03:12.000000Z'
                        updated_at: '2024-08-12T11:03:34.994540Z'
                        version: 2
                        created_by: someone@example.com
                        body: Hi ((firstname)), We have received your letter dated ((date)).  No further action is required.
                        subject: null
                        postage: null
                        letter_contact_block: null
                        personalisation:
                          date:
                            required: true
                          firstname:
                            required: true
                email:
                  value:
                    templates:
                      - id: 8604d595-c65e-4d80-ae33-34fd08c736a5
                        name: Test Email Template
                        type: email
                        created_at: '2024-08-12T10:40:20.000000Z'
                        updated_at: '2024-08-12T10:45:47.890097Z'
                        version: 3
                        created_by: someone@example.com
                        body: "Hi ((firstname)),\r\nWe have received your letter dated ((date)).\r\n No further action is required."
                        subject: Test Email
                        letter_contact_block: null
                        postage: null
                        personalisation:
                          date:
                            required: true
                          firstname:
                            required: true
                letter:
                  value:
                    templates:
                      - id: 142d3a1b-f6cb-4bbb-9732-e1d9f9f2fed4
                        name: Test Letter Template
                        type: letter
                        postage: second
                        created_at: '2024-08-20T19:50:43.000000Z'
                        updated_at: '2024-08-20T19:51:51.980848Z'
                        version: 2
                        created_by: someone@example.com
