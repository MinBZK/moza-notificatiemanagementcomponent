openapi: 3.0.3
info:
  title: NotificatieManagementComponent API
  description: |
    API voor het versturen van notificaties namens een Dienstverlener.
  version: 0.1.0
  contact:
    name: MijnOverheid Zakelijk Team
    email: moza@minbzk.nl
    url: https://github.com/MinBZK/moza-notificatiemanagementcomponent

servers:
  - url: https://nmc.example.nl
    description: Productie (placeholder — invullen bij deployment)
  - url: http://localhost:8081
    description: Lokale ontwikkeling

paths:
  /api/nmc/v1/notificaties:
    post:
      operationId: notificatieVersturen
      summary: Notificatie versturen
      description: |
        Haalt de contactgegevens op bij de Profielservice, verstuurt de notificatie
        en slaat de notificatie op. Als een callbackUrl is meegegeven, stuurt de
        NMC asynchroon een statusupdate (CloudEvents) zodra de bezorgstatus bekend is.
      tags:
        - Notificaties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificatieAanvraagRequest'
      responses:
        '200':
          description: Notificatie succesvol verstuurd
          headers:
            API-Version:
              schema:
                type: string
              description: Versie van de API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificatieResponse'
        '400':
          description: >-
            Ongeldige aanvraag, of er kon geen notificatie worden gedaan voor de
            opgegeven partij (geen partij of geen e-mailadres gevonden voor de
            opgegeven identificatie)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '502':
          description: De notificatie kon niet (succesvol) verzonden worden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /api/nmc/v1/notify-callback:
    post:
      operationId: verwerkAfleverstatus
      summary: Bezorgstatus (delivery receipt) verwerken
      description: |
        Webhook waarop de bezorgstatus (delivery receipt) van een eerder
        verstuurde e-mail gemeld wordt. Na verwerking wordt de status opgeslagen en, als
        er een callbackUrl is meegegeven bij de oorspronkelijke aanvraag, een
        statusupdate (CloudEvents NL GOV) naar die URL gestuurd. Na een geslaagde
        callback wordt het notificatierecord verwijderd.
      tags:
        - NotifyCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AfleverstatusRequest'
      responses:
        '204':
          description: Afleverstatus verwerkt
          headers:
            API-Version:
              schema:
                type: string
              description: Versie van de API
        '400':
          description: Ongeldige aanvraag
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Geen notificatie gevonden voor de opgegeven referentie
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

components:
  schemas:
    IdentificatieType:
      type: string
      description: Type identificatie van de ontvanger
      enum:
        - BSN
        - KVK
        - RSIN

    NotificatieAanvraagRequest:
      type: object
      description: Aanvraag om een notificatie te versturen
      required:
        - identificatieType
        - identificatieNummer
        - dienstverlener
        - dienst
      properties:
        identificatieType:
          $ref: '#/components/schemas/IdentificatieType'
        identificatieNummer:
          type: string
          minLength: 1
          description: BSN-, KVK- of RSIN-nummer van de ontvanger
        dienstverlener:
          type: string
          minLength: 1
          description: Naam van de dienstverlener namens wie de notificatie wordt verstuurd
        dienst:
          type: string
          minLength: 1
          description: Naam van de dienst waarvoor de notificatie wordt verstuurd
        berichtType:
          type: string
          description: >-
            Berichttype, bedoeld voor het opvragen van de juiste template bij
            de Templating Service (nog niet in gebruik)
        berichtgegevens:
          type: object
          description: Templatevariabelen voor het bericht
          additionalProperties:
            type: string
        callbackUrl:
          type: string
          format: uri
          description: >-
            Optionele URL waarop de NMC asynchroon een statusupdate (CloudEvents NL GOV)
            terugstuurt zodra de bezorgstatus bekend is. Weglaten als de
            Dienstverlener de status zelf opvraagt via GET /notificaties/{id}.

    NotificatieResponse:
      type: object
      required:
        - notificatieId
      properties:
        notificatieId:
          type: string
          format: uuid
          description: NMC-interne referentie voor deze notificatie

    AfleverstatusRequest:
      type: object
      description: Bezorgstatus-melding van een eerder verstuurd bericht
      required:
        - id
        - status
        - notification_type
        - to
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Referentie van de verzending bij de verzenddienst
        reference:
          type: string
          nullable: true
          description: Optionele referentie meegegeven bij het versturen
        to:
          type: string
          description: E-mailadres van de ontvanger
        status:
          type: string
          description: Bezorgstatus (bijv. delivered, permanent-failure)
        notification_type:
          type: string
          description: Type notificatie (email)
        created_at:
          type: string
          format: date-time
          description: Tijdstip waarop de notificatie is aangemaakt
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Tijdstip waarop de bezorging is voltooid
        sent_at:
          type: string
          format: date-time
          nullable: true
          description: Tijdstip waarop de e-mail is verstuurd

    Problem:
      type: object
      description: Problem Details (RFC 9457)
      properties:
        type:
          type: string
          format: uri
          default: "about:blank"
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
