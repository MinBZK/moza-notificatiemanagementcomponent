quarkus.openapi-generator.codegen.input-base-dir=src/main/resources/openapi
quarkus.openapi-generator.codegen.spec.profielservice_api_json.base-package=nl.rijksoverheid.moz.nmc.client.profielservice.generated
quarkus.openapi-generator.codegen.spec.profielservice_api_json.config-key=profielservice
quarkus.openapi-generator.codegen.spec.notifynl_api_yaml.base-package=nl.rijksoverheid.moz.nmc.client.notifynl.generated
quarkus.openapi-generator.codegen.spec.notifynl_api_yaml.config-key=notify

quarkus.rest-client.profielservice.url=
%dev.quarkus.rest-client.profielservice.url=http://localhost:8080
%test.quarkus.rest-client.profielservice.url=http://localhost:8081

quarkus.rest-client.notify.url=
%test.quarkus.rest-client.notify.url=https://notifynl.example.invalid
notify.api-key=
# Voor de demo 16 juli aan de stuurgroep is deze template-id hardcoded. Deze hardcoded oplossing wordt nog vervangen door #815
notify.template-id=e72c75c5-e74c-4a78-8f2d-c06187a4d51c
%test.notify.api-key=test-api-key-niet-voor-productie
%test.notify.template-id=00000000-0000-0000-0000-000000000000

consument-callback.initiele-wacht-ms=1000

# Geheime pepper voor HashHelper (keyed HMAC-SHA-256) — leeg hier, lokaal in te vullen via
# application-dev.properties (niet ingecheckt), in productie via het secret-mechanisme.
hash.pepper=
%test.hash.pepper=test-pepper-niet-voor-productie

mp.openapi.scan.disable=true
mp.openapi.info.version=0.1.0

# Jacoco. quarkus-jacoco regelt de dekking van @QuarkusTest (die bytecode augmenteert); de
# reguliere jacoco-maven-plugin instrumenteert de plain-unittests. Beide schrijven naar dezelfde
# execdata (reuse-data-file), zodat het gecombineerde rapport álle tests dekt i.p.v. alleen de
# QuarkusTests. Gegenereerde OpenAPI-code (interfaces, modellen, clients) valt buiten de cijfers.
# quarkus-jacoco is test-scoped: in het gepackagede image (prod-profiel) bestaat de extensie
# niet, dus alleen onder %test zetten — anders "Unrecognized configuration key" bij containerstart.
%test.quarkus.jacoco.reuse-data-file=true
%test.quarkus.jacoco.data-file=target/jacoco.exec
%test.quarkus.jacoco.excludes=**/api/**,**/generated/**

# Container-image (jib). Group/registry/tag/push/credentials komen uit de CI-flags
# (-Dquarkus.container-image.*), niet uit deze file. Alleen de image-naam staat hier
# vast voor een stabiele coordinaat: <registry>/<group>/notificatiemanagementcomponent.
quarkus.container-image.name=moza-notificatiemanagementcomponent
# Java 25: jib's default UBI-runtime-base volgt geen 25 → expliciete JRE-base pinnen
# (zelfde runtime als de oude Dockerfile).
quarkus.jib.base-jvm-image=eclipse-temurin:25-jre
# Niet als root draaien (mirror van de oude Dockerfile USER 1001). Numerieke uid hoeft
# niet in /etc/passwd te staan om te draaien.
quarkus.jib.user=1001

quarkus.datasource.db-kind=postgresql
# Credentials en JDBC-url komen uit de runtime-omgeving via env-var name-mangling:
# QUARKUS_DATASOURCE_USERNAME / _PASSWORD / _JDBC_URL overschrijven deze properties. Die
# env-vars worden per deployomgeving gezet (ZAD-deployment voor PR-previews, het
# release-cluster voor echte releases). Geen creds hier (de localhost-url is enkel een
# onschuldige default; %dev/%test zetten hun eigen).
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/nmc
quarkus.hibernate-orm.schema-management.strategy=validate

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
%prod.quarkus.flyway.migrate-at-start=false

%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=nmc
%dev.quarkus.datasource.password=nmc
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/nmc

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:nmc;DB_CLOSE_DELAY=-1

logboekdataverwerking.enabled=false
logboekdataverwerking.service-name=notificatiemanagementcomponent

%prod.logboekdataverwerking.enabled=
%prod.logboekdataverwerking.clickhouse.endpoint=
%prod.logboekdataverwerking.clickhouse.username=
%prod.logboekdataverwerking.clickhouse.password=
%prod.logboekdataverwerking.clickhouse.database=
%prod.logboekdataverwerking.clickhouse.table=
