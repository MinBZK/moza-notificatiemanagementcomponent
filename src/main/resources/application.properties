quarkus.openapi-generator.codegen.input-base-dir=src/main/resources/openapi
quarkus.openapi-generator.codegen.spec.profielservice_api_json.base-package=nl.rijksoverheid.moz.nmc.client.profielservice.generated
quarkus.openapi-generator.codegen.spec.profielservice_api_json.config-key=profielservice
quarkus.openapi-generator.codegen.spec.notifynl_api_yaml.base-package=nl.rijksoverheid.moz.nmc.client.notify.generated
quarkus.openapi-generator.codegen.spec.notifynl_api_yaml.config-key=notify

quarkus.rest-client.profielservice.url=http://profiel-service
%dev.quarkus.rest-client.profielservice.url=http://localhost:8080
%test.quarkus.rest-client.profielservice.url=http://localhost:8081

quarkus.rest-client.notify.url=https://notifynl.example.invalid
notify.api-key=
notify.template-id=

mp.openapi.scan.disable=true
mp.openapi.info.version=0.1.0

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:}
quarkus.datasource.password=${DB_PASSWORD:}
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/nmc
quarkus.hibernate-orm.schema-management.strategy=validate

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
%prod.quarkus.flyway.migrate-at-start=false

%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=nmc
%dev.quarkus.datasource.password=nmc
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/nmc

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:nmc;DB_CLOSE_DELAY=-1

logboekdataverwerking.enabled=false
logboekdataverwerking.service-name=notificatiemanagementcomponent

%prod.logboekdataverwerking.enabled=
%prod.logboekdataverwerking.clickhouse.endpoint=
%prod.logboekdataverwerking.clickhouse.username=
%prod.logboekdataverwerking.clickhouse.password=
%prod.logboekdataverwerking.clickhouse.database=
%prod.logboekdataverwerking.clickhouse.table=
